<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <link rel="stylesheet" href="/static/css/addtocart.css">
        <script src="https://kit.fontawesome.com/92d70a2fd8.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="header">
            <img class="logo" src="/static/image/uslogo.png"></img>
            <div class="bar">
               
                        <a id="fh"href="http://127.0.0.1:8000/">Home</a>
                    
                        <a href="http://127.0.0.1:8000/contact/">contact Us</a>
                    
                        
                            <a class="nav-link" href="{% url 'showProducts'%}">Food Items</a>
                          
                    
                        
                
            </div>
            <div class="cart"><i class="fa-solid fa-cart-shopping"></i><p id="count">0</p></div>
        </div>
        <div class="container">
            <div id="root"></div>
            <div class="sidebar">
                <div class="head"><p>My Cart</p></div>
                <div id="cartItem">Your cart is empty</div>
                <div class="foot">
                    <h3>Total</h3>
                    <h2 id="total">$ 0.00</h2>
                </div>

                <div class="check">
                    <button type="submit"><a class="check" href="{%url 'login'%}">CheckOut</a></button>
                </div>
            </div>
        </div>
        <script src="/static/js/addtocart.js"></script>
    </body>
</html>
