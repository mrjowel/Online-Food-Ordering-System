<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link href="/static/css/payment.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"
        integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <h2>Payment Form</h2>
        <form id="paymentForm" method="POST">
            <h4>ORDER DETAILS</h4>
            <div class="input-group">
                <div class="input-box">
                    <input type="text" placeholder="CUSTOMER NAME" disabled class="name">
                    <i class="fa fa-user icon"></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="ORDER ID" disabled class="name">
                    <i class="fa fa-user icon"></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-box">
                    <h4>PAYMENT DETAILS</h4>
                    <input type="radio" name="pay" id="bc1" checked class="radio">
                    <label for="bc1"><span><i class="fa fa-cc-visa"></i> Credit Card</span></label>
                    <input type="radio" name="pay" id="bc2" class="radio">
                    <label for="bc2"><span> bKash</span></label>

                </div>
            </div>
            <div class="input-group">
                <div class="input-box">
                    <input type="tel" placeholder="Card Number" required class="name" name="cardNumber">
                    <i class="fa fa-credit-card icon"></i>
                </div>
            </div>
            <div class="input-group">
                <div class="input-box">
                    <input type="tel" placeholder="Card CVC" required class="name" name="cardCVC">
                    <i class="fa fa-key icon"></i>
                </div>
                <div class="input-box">
                    <select>
                        <option>JAN</option>
                        <option>FEB</option>
                        <option>MAR</option>
                        <option>APR</option>
                        <option>MAY</option>
                        <option>JUN</option>
                        <option>JUL</option>
                        <option>AUG</option>
                        <option>SEP</option>
                        <option>OCT</option>
                        <option>NOV</option>
                        <option>DEC</option>
                    </select>
                    <select>
                        <option>2023</option>
                        <option>2024</option>
                        <option>2025</option>
                        <option>2026</option>
                        <option>2027</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <div class="input-box">
                    <button type="submit">PAY NOW</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("paymentForm").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent form submission

            // Validate required fields
            var cardNumber = document.querySelector("input[name='cardNumber']");
            var cardCVC = document.querySelector("input[name='cardCVC']");
            if (cardNumber.value.trim() === "" || cardCVC.value.trim() === "") {
                alert("Please fill in all required fields.");
            } else {
                // Proceed with form submission
                alert("Payment successful!"); // Replace with your desired behavior
                // document.getElementById("paymentForm").submit(); // Uncomment this line to submit the form
            }
        });
    </script>
</body>

</html>
